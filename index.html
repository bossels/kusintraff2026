<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kusinträff 2026 – Anmälan</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#1a1a1a;background:#f5f4f0;}
.login-outer{padding:2rem 1.5rem;max-width:700px;margin:0 auto;}
.login-wrap{display:flex;border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.1);}
.login-img{flex:1;background:linear-gradient(135deg,#1a3a1a 0%,#2d5a2d 50%,#1e4a2e 100%);display:flex;flex-direction:column;justify-content:space-between;padding:1.75rem;}
.login-img-title{color:white;font-size:22px;font-weight:500;}
.login-img-sub{color:rgba(255,255,255,0.75);font-size:13px;margin-top:4px;}
.login-img-photos{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:1.5rem;border-radius:8px;overflow:hidden;}
.login-img-photos img{width:100%;height:70px;object-fit:cover;display:block;}
.login-form{flex:1;background:white;padding:1.75rem;}
.login-form h2{font-size:15px;font-weight:500;margin-bottom:1.25rem;color:#1a1a1a;}
.login-form label{font-size:13px;color:#555;display:block;margin-bottom:5px;}
.login-form input{width:100%;margin-bottom:0.75rem;padding:9px 11px;border:1px solid #ddd;border-radius:8px;font-size:14px;color:#1a1a1a;background:white;}
.login-form input:focus{outline:none;border-color:#185FA5;}
.login-form .err{color:#dc2626;font-size:13px;margin-bottom:0.75rem;display:none;}
.btn-login{width:100%;padding:10px;font-size:14px;font-weight:500;cursor:pointer;border-radius:8px;border:none;background:#185FA5;color:white;}
.btn-login:hover{background:#0C447C;}
.lhdr{height:90px;position:relative;overflow:hidden;}
.lhdr img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 40%;}
.lhdr-ov{position:absolute;inset:0;background:rgba(0,0,0,0.42);display:flex;align-items:center;padding:0 2rem;}
.lhdr-txt{color:white;font-size:18px;font-weight:500;}
.lhdr-sub{color:rgba(255,255,255,0.75);font-size:13px;margin-top:2px;}
.wrap{max-width:700px;margin:0 auto;padding:1.5rem 1.5rem;}
.card{background:white;border:1px solid #e5e3dc;border-radius:12px;padding:1.25rem;margin-bottom:1rem;}
.prow{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid #f0ede6;}
.prow:last-child{border-bottom:none;}
.pname{font-size:14px;color:#1a1a1a;}
.prel{font-size:11px;color:#888;}
.cg{display:flex;gap:5px;flex-wrap:wrap;margin-left:auto;}
.cb{padding:7px 13px;font-size:12px;font-weight:500;border-radius:6px;border:2px solid #ddd;cursor:pointer;white-space:nowrap;background:#f5f4f0;color:#666;}
.cb:hover{border-color:#999;color:#333;}
.cj{background:#27500A;color:white;border-color:#27500A;}
.ck{background:#854F0B;color:white;border-color:#854F0B;}
.cn{background:#A32D2D;color:white;border-color:#A32D2D;}
.og{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.25rem;}
.sc{background:#f5f4f0;border-radius:8px;padding:0.75rem;text-align:center;}
.sn{font-size:24px;font-weight:500;}
.slb{font-size:12px;color:#888;}
.tb{display:flex;margin-bottom:1.25rem;border-bottom:1px solid #e5e3dc;}
.t{padding:8px 16px;font-size:14px;cursor:pointer;border-bottom:2px solid transparent;color:#888;background:none;border-top:none;border-left:none;border-right:none;}
.t:hover{color:#333;}
.t.a{color:#185FA5;border-bottom-color:#185FA5;}
.pi{display:flex;gap:14px;padding:8px 0;border-bottom:1px solid #f0ede6;font-size:14px;}
.pi:last-child{border-bottom:none;}
.pt{color:#888;min-width:56px;font-size:13px;}
.pd{font-size:13px;font-weight:500;color:#185FA5;margin:1rem 0 0.5rem;}
.ov-table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed;}
.ov-table th{text-align:left;font-size:11px;font-weight:500;color:#888;padding:8px 10px;border-bottom:1px solid #ddd;text-transform:uppercase;letter-spacing:0.04em;cursor:pointer;user-select:none;background:#f9f8f5;}
.ov-table th:hover{color:#333;}
.ov-table th.sorted{color:#185FA5;}
.sort-arrow{margin-left:4px;font-size:10px;}
.ov-table td{padding:8px 10px;border-bottom:1px solid #f0ede6;vertical-align:middle;}
.ov-table tr:last-child td{border-bottom:none;}
.ov-table tbody tr:hover td{background:#faf9f6;}
.badge{display:inline-block;padding:4px 10px;border-radius:4px;font-size:12px;font-weight:500;}
.bj{background:#27500A;color:white;}
.bk{background:#854F0B;color:white;}
.bn{background:#A32D2D;color:white;}
.be{background:#f0ede6;color:#888;border:1px solid #ddd;}
iframe{display:block;}
.spinner{text-align:center;padding:2rem;color:#888;font-size:14px;}
.saving{font-size:12px;color:#888;margin-top:4px;min-height:18px;}
</style>
</head>

let S={view:'login',user:null,rsvps:{},comments:{},tab:'anmalan',sortCol:'r',sortDir:1,saving:false};

// Hämta alla svar från SharePoint via Power Automate
async function loadRsvps(){
  try {
    const res = await fetch(HAMTA_URL, {method:'POST', headers:{'Content-Type':'application/json'}, body:'{}'});
    if(!res.ok) return;
    const items = await res.json();
    console.log('SharePoint returnerade:', items.length, 'rader');
    if(items.length > 0) console.log('Första raden:', JSON.stringify(items[0]));
    S.rsvps = {};
    S.comments = {};
    items.forEach(item => {
      const rel = item.Relation || item.Title || '';
      const fnamn = item.Fornamn || '';
      const svar = item.Svar || '';
      const kommentar = item.Kommentar || '';
      if(rel && fnamn) {
        if(svar) S.rsvps[rel+':'+fnamn] = svar;
        if(kommentar) S.comments[rel+':'+fnamn] = kommentar;
      }
    });
  } catch(e){ console.error('Fel vid hämtning:', e); }
}

// Spara ett svar till SharePoint via Power Automate
async function saveRsvp(relation, fornamn, efternamn, svar, kommentar){
  try {
    await fetch(SPARA_URL, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({relation, fornamn, efternamn, svar, kommentar})
    });
  } catch(e){ console.error('Fel vid sparande:', e); }
}

async function saveKommentar(k, relation, fornamn, efternamn, kommentar){
  const svar = S.rsvps[k] || '';
  S.comments[k] = kommentar;
  render();
  saveRsvp(relation, fornamn, efternamn, svar, kommentar);
}

function login(){
  const em=document.getElementById('ei').value.trim().toLowerCase();
  const re=document.getElementById('ri').value.trim().toUpperCase();
  const g=ALL_GUESTS.find(x=>x.e&&x.e.trim().toLowerCase().replace(/\n/g,'')==em&&x.r==re);
  const el=document.getElementById('le');
  if(!g){el.style.display='block';el.textContent='E-post eller relation stämmer inte.';return;}
  S.user=g;
  S.view='main';
  // Visa spinner medan vi laddar svar
  document.getElementById('cnt').innerHTML='<div class="spinner">Laddar svar...</div>';
  hdr();
  loadRsvps().then(()=>render());
}

function visibleForAnmalan(){
  if(!S.user)return[];
  // Ta bort nollor i slutet av relationen: B110 -> B11, B1120 -> B112
  const baseRel = S.user.r.replace(/0+$/, '');
  return ALL_GUESTS.filter(g=>g.r.startsWith(baseRel));
}

async function pick(k, svar, relation, fornamn, efternamn){
  // Toggle
  if(S.rsvps[k]===svar){
    delete S.rsvps[k];
    svar = '';
  } else {
    S.rsvps[k] = svar;
  }
  render();
  // Spara i bakgrunden utan att läsa om – undviker att gamla värdet blinkar tillbaka
  saveRsvp(relation, fornamn, efternamn, svar, S.comments[k] || '');
}

function sortBy(col){
  if(S.sortCol===col)S.sortDir*=-1;
  else{S.sortCol=col;S.sortDir=1;}
  render();
}

function statusOrder(v){return v==='ja'?0:v==='kanske'?1:v==='nej'?2:3;}

function hdr(){
  const h=document.getElementById('hdr');
  if(S.view==='login'){
    h.innerHTML=`<div class="login-outer">
      <div class="login-wrap">
        <div class="login-img">
          <div>
            <div class="login-img-title">Kusinträff 2026</div>
            <div class="login-img-sub">12 september · Närkes Kil, Örebro</div>
          </div>
          <div class="login-img-photos">
            <img src="${I2}" alt=""/>
            <img src="${I1}" alt=""/>
            <img src="${I3}" alt="" style="grid-column:1/-1;height:60px;"/>
          </div>
        </div>
        <div class="login-form">
          <h2>Logga in för att anmäla dig</h2>
          <label>E-postadress</label>
          <input type="email" id="ei" placeholder="namn@exempel.se"/>
          <label>Relation (t.ex. B11)</label>
          <input type="text" id="ri" placeholder="B11" style="text-transform:uppercase;"/>
          <p class="err" id="le"></p>
          <button class="btn-login" onclick="login()">Logga in</button>
        </div>
      </div>
    </div>`;
  } else {
    h.innerHTML=`<div class="lhdr">
      <img src="${I3}" alt=""/>
      <div class="lhdr-ov">
        <div style="flex:1"><div class="lhdr-txt">Kusinträff 2026</div><div class="lhdr-sub">12 september · Närkes Kil</div></div>
        <div style="font-size:13px;color:rgba(255,255,255,0.85);">${S.user.f} ${S.user.l} &nbsp;·&nbsp; <a href="#" onclick="S.view='login';render();return false;" style="color:rgba(255,255,255,0.85);">Logga ut</a></div>
      </div>
    </div>`;
  }
}

function renderOversikt(){
  const sorted=[...ALL_GUESTS].sort((a,b)=>{
    if(S.sortCol==='namn')return(a.f+' '+a.l).localeCompare(b.f+' '+b.l,'sv')*S.sortDir;
    if(S.sortCol==='r')return a.r.localeCompare(b.r,'sv')*S.sortDir;
    if(S.sortCol==='status')return(statusOrder(S.rsvps[a.r+':'+a.f])-statusOrder(S.rsvps[b.r+':'+b.f]))*S.sortDir;
    return 0;
  });
  const arrow=col=>S.sortCol===col?(S.sortDir===1?'↑':'↓'):'↕';
  const rows=sorted.map(g=>{
    const k=g.r+':'+g.f,v=S.rsvps[k];
    const badge=v==='ja'?'<span class="badge bj">✓ Kommer</span>':v==='kanske'?'<span class="badge bk">~ Kanske</span>':v==='nej'?'<span class="badge bn">✗ Kan ej</span>':'<span class="badge be">Ej svarat</span>';
    const kom = S.comments[k] || '';
    return`<tr><td style="font-size:14px;">${g.f} ${g.l}</td><td style="color:#888;font-size:12px;">${g.r}</td><td>${badge}</td><td style="font-size:12px;color:#555;">${kom}</td></tr>`;
  }).join('');
  const ja=ALL_GUESTS.filter(g=>S.rsvps[g.r+':'+g.f]==='ja').length;
  const kanske=ALL_GUESTS.filter(g=>S.rsvps[g.r+':'+g.f]==='kanske').length;
  const nej=ALL_GUESTS.filter(g=>S.rsvps[g.r+':'+g.f]==='nej').length;
  const ej=ALL_GUESTS.length-ja-kanske-nej;
  return`<div class="og">
    <div class="sc"><div class="sn" style="color:#27500A;">${ja}</div><div class="slb">Kommer</div></div>
    <div class="sc"><div class="sn" style="color:#854F0B;">${kanske}</div><div class="slb">Kanske</div></div>
    <div class="sc"><div class="sn" style="color:#A32D2D;">${nej}</div><div class="slb">Kan ej</div></div>
  </div>
  <div class="card" style="padding:0;overflow:hidden;">
    <table class="ov-table">
      <thead><tr>
        <th style="width:35%" onclick="sortBy('namn')" class="${S.sortCol==='namn'?'sorted':''}">Namn <span class="sort-arrow">${arrow('namn')}</span></th>
        <th style="width:15%" onclick="sortBy('r')" class="${S.sortCol==='r'?'sorted':''}">Relation <span class="sort-arrow">${arrow('r')}</span></th>
        <th style="width:25%" onclick="sortBy('status')" class="${S.sortCol==='status'?'sorted':''}">Svar <span class="sort-arrow">${arrow('status')}</span></th>
        <th style="width:25%">Kommentar</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>
  <p style="font-size:12px;color:#888;margin-top:0.5rem;">${ej} av ${ALL_GUESTS.length} har ännu inte svarat.</p>`;
}

function render(){
  hdr();
  const c=document.getElementById('cnt');
  if(S.view==='login'){c.innerHTML='';return;}
  const vg=visibleForAnmalan();
  const cnt={ja:0,k:0,n:0};
  vg.forEach(g=>{const v=S.rsvps[g.r+':'+g.f];if(v==='ja')cnt.ja++;else if(v==='kanske')cnt.k++;else if(v==='nej')cnt.n++;});
  const li=vg.length===0?'<p style="color:#888;">Inga att visa.</p>':vg.map(g=>{
    const k=g.r+':'+g.f,v=S.rsvps[k];
    const kom = S.comments[k] || '';
    return`<div class="prow" style="flex-wrap:wrap;">
      <div style="flex:1;min-width:150px;"><div class="pname">${g.f} ${g.l}</div><div class="prel">${g.r}</div></div>
      <div class="cg">
        <button class="cb ${v==='ja'?'cj':''}" onclick="pick('${k}','ja','${g.r}','${g.f}','${g.l}')">✓ Kommer</button>
        <button class="cb ${v==='kanske'?'ck':''}" onclick="pick('${k}','kanske','${g.r}','${g.f}','${g.l}')">~ Kanske</button>
        <button class="cb ${v==='nej'?'cn':''}" onclick="pick('${k}','nej','${g.r}','${g.f}','${g.l}')">✗ Kan ej</button>
      </div>
      <div style="width:100%;margin-top:6px;padding-left:0;">
        <input type="text" placeholder="Kommentar (valfri)..." value="${kom.replace(/"/g,'&quot;')}"
          style="width:100%;padding:5px 8px;font-size:12px;border:1px solid #ddd;border-radius:6px;background:#fafafa;"
          onblur="saveKommentar('${k}','${g.r}','${g.f}','${g.l}',this.value)"
          onkeydown="if(event.key==='Enter')this.blur()"
        />
      </div>
    </div>`;
  }).join('');
  c.innerHTML=`<div class="wrap"><div class="tb">
    <button class="t ${S.tab==='anmalan'?'a':''}" onclick="S.tab='anmalan';render()">Anmälan</button>
    <button class="t ${S.tab==='program'?'a':''}" onclick="S.tab='program';render()">Program</button>
    <button class="t ${S.tab==='oversikt'?'a':''}" onclick="S.tab='oversikt';loadRsvps().then(()=>render())">Översikt</button>
    <button class="t ${S.tab==='hjalp'?'a':''}" onclick="S.tab='hjalp';render()">Hjälp</button>
  </div>
  ${S.tab==='anmalan'?`<div class="og">
    <div class="sc"><div class="sn" style="color:#27500A;">${cnt.ja}</div><div class="slb">Kommer</div></div>
    <div class="sc"><div class="sn" style="color:#854F0B;">${cnt.k}</div><div class="slb">Kanske</div></div>
    <div class="sc"><div class="sn" style="color:#A32D2D;">${cnt.n}</div><div class="slb">Kan ej</div></div>
  </div><div class="card">${li}</div>`:''}
  ${S.tab==='program'?`<div class="card" style="padding:0;overflow:hidden;">
    <iframe src="program.html" style="width:100%;min-height:420px;border:none;padding:1.25rem;box-sizing:border-box;" onload="this.style.height=this.contentDocument.body.scrollHeight+40+'px'"></iframe>
  </div>`:''}
  ${S.tab==='oversikt'?renderOversikt():''}
  ${S.tab==='hjalp'?`<div class="card" style="padding:0;overflow:hidden;">
    <iframe src="hjalp.html" style="width:100%;min-height:300px;border:none;padding:1.25rem;box-sizing:border-box;" onload="this.style.height=this.contentDocument.body.scrollHeight+40+'px'"></iframe>
  </div>`:''}
  </div>`;
}

render();
</script>
